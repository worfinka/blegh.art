<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Track | blegh.art</title>

    <meta property="og:title" content="blegh.art">

    <meta property="og:description"
          content="Track information">

    <meta property="og:image"
          content="../logo.svg">

    <meta property="og:type"
          content="website">

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="page">

    <!-- RIGHT PARALLAX TITLE -->

    <div class="track-wall" id="track-wall"></div>

    <!-- HEADER -->

    <header class="top-header">

        <a href="../" class="logo">
            <img src="../logo.svg" alt="blegh.art">
        </a>

        <div class="page-title">
            . track info
        </div>

        <div></div>

    </header>



    <!-- TRACK -->

    <main class="track-layout">

        <section class="track-header">

            <img
                id="track-cover"
                class="track-cover"
                src="../images/albums/placeholder.jpg"
                alt="Album cover">

            <div class="track-meta">

                <h1 id="track-title">
                    Loading...
                </h1>

                <div
                    id="track-album"
                    class="track-album">
                </div>

                <div
                    id="track-length"
                    class="track-length">
                </div>

                <!-- JS сам генерирует ссылки -->
                <div
                    id="track-links"
                    class="track-links">
                </div>

            </div>

        </section>



        <!-- QUOTE -->

        <section class="quote-block">

            <section class="quote-main">

                <span class="quote-mark">
                    “
                </span>

                <p
                    id="quote"
                    class="quote-text">
                </p>

            </section>

        </section>



        <!-- SHORT DESCRIPTION -->

        <section
            id="track-short"
            class="track-short">
        </section>



        <!-- DESCRIPTION -->

        <section
            id="track-description"
            class="track-description">
        </section>



        <!-- REFERENCES -->

        <section class="references">

            <h2>
                References
            </h2>

            <div id="references-list"></div>

        </section>



        <!-- TREE (будет позже) -->

        <section
            id="reference-tree"
            class="reference-tree">
        </section>

    </main>



    <footer>

        © <span id="copyright-year"></span> blegh.art, unofficial fan project

        <br>

        All related materials belong to their respective owners

    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
