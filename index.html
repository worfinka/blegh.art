<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>blegh.art</title>

    <meta name="description"
        content="A love-letter website dedicated to British metalcore band Architects.">

    <!-- OpenGraph -->

    <meta property="og:title" content="blegh.art">
    <meta property="og:description"
        content="A love-letter website dedicated to British metalcore band Architects.">
    <meta property="og:image" content="images/og-main.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="page">

<!-- HEADER -->

<header class="top-header">

    <a href="/" class="logo">
        <img src="logo.svg" alt="blegh.art">
    </a>

    <h1 class="page-title">
        . main page
    </h1>

    <p class="site-description">
        A love-letter website
        dedicated to British
        metalcore band
        <strong>Architects.</strong>
    </p>

</header>

<!-- MAIN -->

<main>

<section class="hero">

    <!-- LEFT -->

    <div class="hero-left">

        <h2 class="today">

            <span>Today is</span>

            <strong id="today-date">
                Loading...
            </strong>

        </h2>

        <!-- NEWS -->

        <article class="news-card" id="news-card">

            <img
                src="images/placeholder.jpg"
                alt=""
                class="news-image"
                id="news-image">

            <div class="news-content">

                <p class="news-years" id="news-years">
                    ...
                </p>

                <p class="news-description"
                    id="news-description">

                    Loading...

                </p>

                <div class="news-links"
                    id="news-links">

                </div>

            </div>

        </article>

        <!-- RANDOM QUOTE -->

        <section class="quote-block" id="quote-block">

            <div class="quote-main">

                <span class="quote-mark">“</span>

                <p class="quote-text" id="quote"></p>

            </div>

            <div class="quote-source" id="quote-source"></div>

        </section>

    </div>

    <!-- RIGHT -->

    <aside class="hero-right">

        <nav>

            <ul class="menu">

                <li>
                    <a href="https://github.com/worfinka/blegh.art">
                        Github
                    </a>
                </li>

                <li>
                    <a href="#">
                        Similar websites
                    </a>
                </li>

                <li>
                    <a href="#">
                        The original plan
                    </a>
                </li>

                <li>
                    <a href="#">
                        Credits
                    </a>
                </li>

            </ul>

        </nav>

    </aside>

</section>

<!-- ALBUMS -->

<section class="albums">

    <div id="albums-container">

        <!-- JS -->

    </div>

</section>

</main>

<!-- FOOTER -->

<footer>

<p>

© <span id="copyright-year"></span> blegh.art,
unofficial fan project

<br>

All related materials belong to their respective owners.

</p>

</footer>

</div>

<!-- DATA -->

<script src="script.js"></script>

</body>

</html>
